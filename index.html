<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dino Run 2.0 - Modern</title>
    <!-- Подключаем 2 шрифта: Fredoka для заголовков, Nunito для текста -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #000; touch-action: none; 
            font-family: 'Nunito', sans-serif;
        }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        canvas { display: block; width: 100%; height: 100%; }

        /* --- СОВРЕМЕННЫЕ СТИЛИ ИНТЕРФЕЙСА (UI) --- */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; 
            flex-direction: column; justify-content: center; align-items: center;
            background: rgba(15, 23, 42, 0.4); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            z-index: 20; color: white;
            transition: opacity 0.3s ease;
        }
        .screen.active { display: flex; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- ЗАГРУЗОЧНЫЙ ЭКРАН --- */
        #screenLoading { background: transparent; backdrop-filter: none; -webkit-backdrop-filter: none; }
        .loading-header { position: absolute; top: 15%; width: 100%; text-align: center; animation: floatText 3s ease-in-out infinite; }
        
        .loading-header h1 { 
            font-family: 'Fredoka One', cursive; font-size: 80px; letter-spacing: 4px; margin: 0;
            background: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 15px rgba(241, 39, 17, 0.4));
        }
        .loading-header p { font-size: 24px; font-weight: 700; color: #f8fafc; text-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-top: 10px; opacity: 0.9; }
        
        @keyframes floatText { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .loading-bar-wrapper { position: absolute; bottom: 50px; width: 50%; left: 25%; max-width: 400px; }
        .loading-bar-container { 
            background: rgba(30, 41, 59, 0.6); padding: 8px; border-radius: 50px; 
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .loading-bar-track { background: rgba(15, 23, 42, 0.8); border-radius: 50px; height: 20px; overflow: hidden; position: relative; }
        #loadingBarFill { 
            width: 0%; height: 100%; 
            background: linear-gradient(90deg, #f5af19, #f12711); 
            border-radius: 50px; transition: width 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px rgba(241, 39, 17, 0.6);
        }

        /* --- ГЛАВНОЕ МЕНЮ И ЭФФЕКТЫ --- */
        #screenMenu { background: radial-gradient(circle at 50% 120%, rgba(34, 197, 94, 0.15) 0%, rgba(15, 23, 42, 0.6) 70%); }

        /* --- СТЕКЛЯННЫЕ ПАНЕЛИ (GLASSMORPHISM) --- */
        .panel {
            position: relative; z-index: 1; 
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px 50px; border-radius: 32px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 90%; max-height: 90vh; display: flex; flex-direction: column;
        }
        
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .panel h1 { 
            font-family: 'Fredoka One', cursive; margin: 0 0 10px 0; font-size: 54px; letter-spacing: 2px;
            background: linear-gradient(to right, #f1c40f, #f39c12); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
        }
        .panel h2 { 
            font-family: 'Fredoka One', cursive; margin: 0 0 15px 0; font-size: 36px; color: #4ade80; 
            text-shadow: 0 4px 10px rgba(74, 222, 128, 0.3);
        }
        .panel h2.danger { color: #f87171; text-shadow: 0 4px 10px rgba(248, 113, 113, 0.3); }
        .panel p { font-size: 18px; margin-bottom: 30px; color: #cbd5e1; font-weight: 400; line-height: 1.6; }
        .panel p b { color: #f8fafc; font-weight: 800; }
        
        .btn-container { display: flex; flex-direction: column; gap: 16px; align-items: center; width: 100%; }

        .level-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px; 
            max-height: 50vh; overflow-y: auto; padding: 10px; width: 100%;
            scrollbar-width: thin; scrollbar-color: #64748b transparent;
        }
        .level-grid::-webkit-scrollbar { width: 6px; }
        .level-grid::-webkit-scrollbar-thumb { background-color: #64748b; border-radius: 10px; }
        @media (max-width: 600px) { .level-grid { grid-template-columns: 1fr; } .panel { padding: 30px 20px; } }

        /* --- СОВРЕМЕННЫЕ КНОПКИ --- */
        .game-button {
            --c1: #22c55e; --c2: #16a34a; --shadow: rgba(34, 197, 94, 0.4); --text: #ffffff;
            background: linear-gradient(135deg, var(--c1) 0%, var(--c2) 100%);
            border: none; border-radius: 100px; padding: 16px 32px;
            cursor: pointer; outline: none; width: 100%; max-width: 320px;
            box-shadow: 0 8px 20px -6px var(--shadow), inset 0 -3px 0 rgba(0,0,0,0.15), inset 0 2px 0 rgba(255,255,255,0.2);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text); position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        .game-button .text { font-family: 'Fredoka One', cursive; font-size: 24px; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .game-button small { font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; margin-top: 4px; opacity: 0.9; text-transform: uppercase; letter-spacing: 0.5px; }

        .game-button:hover { transform: translateY(-3px); box-shadow: 0 12px 25px -5px var(--shadow), inset 0 -3px 0 rgba(0,0,0,0.15), inset 0 2px 0 rgba(255,255,255,0.2); }
        .game-button:active { transform: translateY(2px); box-shadow: 0 4px 10px -4px var(--shadow), inset 0 -1px 0 rgba(0,0,0,0.15); }

        .game-button.secondary { --c1: #64748b; --c2: #475569; --shadow: rgba(100, 116, 139, 0.4); }
        .game-button.level-btn { border-radius: 24px; padding: 18px 15px; height: 100%; }

        /* --- СОВРЕМЕННЫЙ HUD --- */
        #hud {
            position: absolute; top: 24px; left: 24px; z-index: 10;
            background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            padding: 12px 24px; display: none; flex-direction: column; gap: 2px;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }
        .hud-main { font-family: 'Fredoka One', cursive; font-size: 24px; color: #fbbf24; text-shadow: 0 2px 6px rgba(0,0,0,0.4); display: flex; align-items: center; gap: 10px; }
        .hud-main span { color: #fff; font-size: 28px; }
        .hud-sub { font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .hud-sub span { color: #cbd5e1; }

        /* Контролы для мобильных */
        #mobileControls { position: absolute; bottom: 0; left: 0; width: 100%; height: 50%; z-index: 5; display: none; pointer-events: auto; }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- ЗОНЫ ДЛЯ СЕНСОРНОГО УПРАВЛЕНИЯ НА ТЕЛЕФОНАХ -->
    <div id="mobileControls">
        <div id="touchJump" style="width: 100%; height: 100%;"></div>
    </div>

    <!-- ИГРОВОЙ ХУД -->
    <div id="hud">
        <div class="hud-main">УРОВЕНЬ <span id="hudLevel">1</span> &nbsp;|&nbsp; <span id="hudScore">0</span></div>
        <div class="hud-sub">Рекорд: <span id="hudHighScore">0</span></div>
    </div>

    <!-- ЭКРАН ЗАГРУЗКИ -->
    <div id="screenLoading" class="screen active">
        <div class="loading-header">
            <h1>DINO RUN</h1>
            <p>Генерация мира...</p>
        </div>
        <div class="loading-bar-wrapper">
            <div class="loading-bar-container">
                <div class="loading-bar-track">
                    <div id="loadingBarFill"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="screenMenu" class="screen">
        <div class="panel">
            <h1>DINO RUN</h1>
            <div class="btn-container">
                <button class="game-button" id="btnPlayMenu">
                    <span class="text">ИГРАТЬ</span>
                </button>
                <button class="game-button secondary" id="btnExit">
                    <span class="text">ВЫЙТИ</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ЭКРАН ВЫБОРА УРОВНЯ -->
    <div id="screenLevelSelect" class="screen">
        <div class="panel" style="max-width: 800px;">
            <h2>ВЫБЕРИТЕ УРОВЕНЬ</h2>
            <div class="level-grid">
                <button class="game-button level-btn" id="btnLvl1" style="--c1: #22c55e; --c2: #15803d; --shadow: rgba(34, 197, 94, 0.4);">
                    <span class="text">Уровень 1</span><small>Горы и Птеродактили</small>
                </button>
                <button class="game-button level-btn" id="btnLvl2" style="--c1: #d97706; --c2: #b45309; --shadow: rgba(217, 119, 6, 0.4);">
                    <span class="text">Уровень 2</span><small>Пеньки и Злые Совы</small>
                </button>
                <button class="game-button level-btn" id="btnLvl3" style="--c1: #3b82f6; --c2: #1d4ed8; --shadow: rgba(59, 130, 246, 0.4);">
                    <span class="text">Уровень 3</span><small>Город и Злые Дроны</small>
                </button>
                <button class="game-button level-btn" id="btnLvl4" style="--c1: #eab308; --c2: #a16207; --shadow: rgba(234, 179, 8, 0.4);">
                    <span class="text">Уровень 4</span><small>Пустыня и Летучие мыши</small>
                </button>
                <button class="game-button level-btn" id="btnLvl5" style="--c1: #06b6d4; --c2: #0e7490; --shadow: rgba(6, 182, 212, 0.4);">
                    <span class="text">Уровень 5</span><small>Зима и Снежные совы</small>
                </button>
                <button class="game-button level-btn" id="btnLvl6" style="--c1: #ef4444; --c2: #b91c1c; --shadow: rgba(239, 68, 68, 0.4);">
                    <span class="text">Уровень 6</span><small>Вулкан и Драконы</small>
                </button>
            </div>
            <div class="btn-container" style="margin-top: 20px;">
                <button class="game-button secondary" id="btnBackToMenu">
                    <span class="text">НАЗАД</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ЭКРАН ПОБЕДЫ -->
    <div id="screenLevelComplete" class="screen">
        <div class="panel">
            <h2>УРОВЕНЬ <span id="lcLevel">1</span> ПРОЙДЕН!</h2>
            <p>Заработано очков: <b id="lcScore">0</b></p>
            <div class="btn-container">
                <button class="game-button" id="btnNextLevel">
                    <span class="text">ДАЛЕЕ ➔</span>
                </button>
                <button class="game-button secondary" id="btnMenuFromComplete">
                    <span class="text">В МЕНЮ</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ЭКРАН ПРОИГРЫША -->
    <div id="screenGameOver" class="screen">
        <div class="panel">
            <h2 class="danger">ИГРА ОКОНЧЕНА</h2>
            <p>Вы дошли до Уровня <span id="goLevel">1</span><br>Счёт: <b id="goScore">0</b></p>
            <div class="btn-container">
                <button class="game-button" id="btnRestart">
                    <span class="text">ПОВТОРИТЬ ⟳</span>
                </button>
                <button class="game-button secondary" id="btnMenuFromGameOver">
                    <span class="text">В МЕНЮ</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ЭКРАН ПОЛНОЙ ПОБЕДЫ -->
    <div id="screenGameComplete" class="screen">
        <div class="panel">
            <h2 style="color: #fbbf24; text-shadow: 0 4px 10px rgba(251, 191, 36, 0.3);">ВЕЛИКОЛЕПНО!</h2>
            <p>Вы прошли все 6 уровней!<br>Ваш итоговый счёт: <b id="gcScore">0</b></p>
            <div class="btn-container">
                <button class="game-button" id="btnRestartGame">
                    <span class="text">НАЧАТЬ СНАЧАЛА</span>
                </button>
                <button class="game-button secondary" id="btnMenuFromWin">
                    <span class="text">В МЕНЮ</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Настройки и состояние
        let width = window.innerWidth;
        let height = window.innerHeight;
        let baseSpeed = 5; 
        let speedMultiplier = 1; 
        let scrollPos = 0;
        
        const TILE_WIDTH = 3000;

        // UI Элементы
        const screenLoading = document.getElementById('screenLoading');
        const screenMenu = document.getElementById('screenMenu');
        const screenLevelSelect = document.getElementById('screenLevelSelect');
        const screenLevelComplete = document.getElementById('screenLevelComplete');
        const screenGameOver = document.getElementById('screenGameOver');
        const screenGameComplete = document.getElementById('screenGameComplete');
        const hud = document.getElementById('hud');
        const mobileControls = document.getElementById('mobileControls');
        
        // --- АУДИО И ФОНОВАЯ МУЗЫКА (Процедурная) ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playTone(freq, type, duration, vol=0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }
        function playJumpSound() { playTone(400, 'sine', 0.15, 0.1); setTimeout(()=>playTone(600, 'sine', 0.15, 0.1), 50); }
        function playScoreSound() { playTone(800, 'square', 0.1, 0.05); setTimeout(()=>playTone(1200, 'square', 0.2, 0.05), 100); }
        function playHitSound() { playTone(150, 'sawtooth', 0.4, 0.2); setTimeout(()=>playTone(100, 'square', 0.3, 0.2), 50); }

        // --- МУЗЫКАЛЬНЫЙ СЕКВЕНСОР ---
        const bgmThemes = {
            mountains: { notes: [261.6, 0, 329.6, 0, 392.0, 0, 329.6, 0], type: 'square', speed: 150 },
            forest: { notes: [220.0, 0, 261.6, 0, 329.6, 261.6, 220.0, 0], type: 'triangle', speed: 180 },
            city: { notes: [130.8, 130.8, 0, 130.8, 155.6, 0, 130.8, 0], type: 'sawtooth', speed: 130 },
            desert: { notes: [293.6, 0, 311.1, 0, 349.2, 311.1, 293.6, 0], type: 'square', speed: 160 },
            winter: { notes: [523.2, 0, 587.3, 0, 659.2, 0, 587.3, 0], type: 'sine', speed: 200 },
            volcano: { notes: [98.0, 110.0, 98.0, 110.0, 98.0, 110.0, 123.4, 0], type: 'sawtooth', speed: 120 }
        };
        
        let bgmInterval = null;
        let bgmStep = 0;

        function startBGM(level) {
            stopBGM();
            if (!audioCtx) initAudio();
            const themeName = getLevelType(level);
            const theme = bgmThemes[themeName];
            bgmStep = 0;
            bgmInterval = setInterval(() => {
                if (gameState !== 'playing') return;
                const freq = theme.notes[bgmStep % theme.notes.length];
                
                // Проигрываем основную ноту
                if (freq > 0) {
                    playTone(freq, theme.type, theme.speed / 1000, 0.02); 
                }
                
                // Добавляем простой ритм (кик) на каждую четвертую долю
                if (bgmStep % 4 === 0) {
                    playTone(100, 'square', 0.05, 0.03);
                }
                
                bgmStep++;
            }, theme.speed);
        }

        function stopBGM() {
            if (bgmInterval) {
                clearInterval(bgmInterval);
                bgmInterval = null;
            }
        }

        window.addEventListener('resize', () => { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; generateGround(); });
        canvas.width = width; canvas.height = height;

        // --- ДАННЫЕ ПРОЦЕДУРНОЙ ГЕНЕРАЦИИ ---
        const clouds = []; const mountainsFar = []; const mountainsNear = []; const forestFar = []; const forestNear = []; const cityBuildingsFar = []; const cityBuildingsNear = []; const cityTrees = []; const groundElements = [];
        let particles = []; 

        const colors = {
            mountains: { skyTop: '#4ca1df', skyBottom: '#cde6f9', cloud: 'rgba(255, 255, 255, 0.8)', bgFar: '#6db5eb', bgNear: '#358adb', snow: '#ffffff', groundRock: '#5c565e', groundRockDark: '#443f45', grassTop: '#80cd28', grassBottom: '#5da016' },
            sunset: { skyTop: '#ff7b54', skyBottom: '#ffd56b', cloud: 'rgba(255, 255, 255, 0.6)', bgFar: '#d16a49', bgNear: '#a34c32', snow: '#ffebc4', groundRock: '#5c433d', groundRockDark: '#3d2c28', grassTop: '#e68f3e', grassBottom: '#b36822' },
            forest: { skyTop: '#1b5e40', skyBottom: '#85d69e', cloud: 'rgba(180, 255, 200, 0.25)', bgFar: '#184d33', bgNear: '#0d3320', groundRock: '#6b8e5c', groundRockDark: '#4a6b3e', grassTop: '#8ce067', grassBottom: '#5bb835' },
            city: { skyTop: '#8ebce6', skyBottom: '#d0e5f5', cloud: 'rgba(255, 255, 255, 0.9)', bgFar: '#a5c6e8', bgNear: '#5a82a8', groundRock: '#4f5054', groundRockDark: '#65786d', grassTop: '#8ba195', grassBottom: '#4f5054' },
            desert: { skyTop: '#f39c12', skyBottom: '#f1c40f', cloud: 'rgba(255, 255, 255, 0.5)', bgFar: '#d35400', bgNear: '#e67e22', snow: null, groundRock: '#d35400', groundRockDark: '#a84300', grassTop: '#f1c40f', grassBottom: '#f39c12' },
            winter: { skyTop: '#74b9ff', skyBottom: '#dfe6e9', cloud: 'rgba(255, 255, 255, 0.9)', bgFar: '#0984e3', bgNear: '#00cec9', snow: '#ffffff', groundRock: '#b2bec3', groundRockDark: '#636e72', grassTop: '#ffffff', grassBottom: '#dfe6e9' },
            volcano: { skyTop: '#2d3436', skyBottom: '#d63031', cloud: 'rgba(99, 110, 114, 0.8)', bgFar: '#b2bec3', bgNear: '#636e72', snow: '#e17055', groundRock: '#2d3436', groundRockDark: '#1e272e', grassTop: '#e17055', grassBottom: '#d63031' }
        };

        function getLevelType(level) { 
            const types = ['mountains', 'forest', 'city', 'desert', 'winter', 'volcano'];
            return types[(level - 1) % types.length]; 
        }

        function initGenerator() {
            for (let i = 0; i < 20; i++) clouds.push({ x: Math.random() * TILE_WIDTH, y: Math.random() * (height * 0.4), scale: 0.5 + Math.random() * 1.5, opacity: 0.5 + Math.random() * 0.5 });
            let farX = 0; while (farX < TILE_WIDTH) { mountainsFar.push({ x: farX, w: 300 + Math.random() * 400, h: 200 + Math.random() * 200 }); farX += (300 + Math.random() * 400) * 0.6; }
            let nearX = 0; while (nearX < TILE_WIDTH) { mountainsNear.push({ x: nearX, w: 400 + Math.random() * 600, h: 300 + Math.random() * 300 }); nearX += (400 + Math.random() * 600) * 0.5; }
            let fFarX = 0; while (fFarX < TILE_WIDTH) { forestFar.push({ x: fFarX, w: 150 + Math.random() * 150, h: 250 + Math.random() * 150 }); fFarX += 100 + Math.random() * 100; }
            let fNearX = 0; while (fNearX < TILE_WIDTH) { forestNear.push({ x: fNearX, w: 200 + Math.random() * 200, h: 400 + Math.random() * 200 }); fNearX += 150 + Math.random() * 100; }
            let cFarX = 0; while (cFarX < TILE_WIDTH) { cityBuildingsFar.push({ x: cFarX, w: 80 + Math.random() * 120, h: 300 + Math.random() * 250, type: Math.floor(Math.random()*3) }); cFarX += 90 + Math.random() * 60; }
            let cNearX = 0; while (cNearX < TILE_WIDTH) { cityBuildingsNear.push({ x: cNearX, w: 100 + Math.random() * 150, h: 200 + Math.random() * 300, type: Math.floor(Math.random()*3) }); cNearX += 120 + Math.random() * 80; }
            let cTreeX = 0; while (cTreeX < TILE_WIDTH) { cityTrees.push({ x: cTreeX, scale: 0.6 + Math.random()*0.6 }); cTreeX += 200 + Math.random() * 300; }
            generateGround();
        }

        function generateGround() {
            groundElements.length = 0; let gX = 0;
            while (gX < TILE_WIDTH) {
                const w = 100 + Math.random() * 150;
                groundElements.push({ x: gX, w, offsetY: Math.random() * 15 - 5, hasFlower: Math.random() > 0.6, flowerType: Math.random() > 0.5 ? 1 : 2 });
                gX += w;
            }
        }

        // --- ИГРОВАЯ МЕХАНИКА И СОСТОЯНИЕ ---

                    vy: (Math.random() - 0.5) * (type === 'explosion' ? 15 : 5) - (type === 'dust' ? 2 : 0),

                    color: color, size: Math.random() * 8 + 4, type: type

            }

                p.x += p.vx; p.y += p.vy; p.life -= p.decay;
                if (p.type === 'dust') p.size *= 0.95;
                if (p.life <= 0) { particles.splice(i, 1); continue; }

                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha = 1.0;
        }

                ctx.restore();
            } else if (type === 'desert') { // Летучая мышь
                ctx.save(); ctx.scale(1.8, 1.8); const wY = flap * 15; ctx.fillStyle = '#2c3e50';
                ctx.beginPath(); ctx.ellipse(0, 0, 10, 15, 0, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.moveTo(5, -5); ctx.quadraticCurveTo(20, wY-25, 35, wY-10); ctx.lineTo(25, wY); ctx.lineTo(15, wY-5); ctx.fill();
                ctx.beginPath(); ctx.moveTo(-5, -5); ctx.quadraticCurveTo(-20, wY-25, -35, wY-10); ctx.lineTo(-25, wY); ctx.lineTo(-15, wY-5); ctx.fill();
                ctx.beginPath(); ctx.moveTo(-5, -10); ctx.lineTo(-10, -20); ctx.lineTo(0, -15); ctx.fill();
                ctx.beginPath(); ctx.moveTo(5, -10); ctx.lineTo(10, -20); ctx.lineTo(0, -15); ctx.fill();
                ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.arc(-3, -5, 2, 0, Math.PI*2); ctx.arc(3, -5, 2, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            } else { // Птеродактиль / Дракон
                ctx.save(); ctx.scale(1.8, 1.8); const wY = flap * 20;
                const isVolcano = type === 'volcano';
                const bodyColor = isVolcano ? '#e74c3c' : '#85B029';
                const darkColor = isVolcano ? '#c0392b' : '#618a14';

                ctx.fillStyle = darkColor; ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(10, -5); ctx.quadraticCurveTo(25, wY - 15, 35, wY - 5); ctx.quadraticCurveTo(20, wY - 5, 15, 0); ctx.fill(); ctx.stroke();

                ctx.fillStyle = bodyColor;
                ctx.beginPath(); ctx.moveTo(5, -5); ctx.quadraticCurveTo(25, -10, 40, 5); ctx.quadraticCurveTo(35, 15, 20, 10); ctx.quadraticCurveTo(10, 15, 0, 0); ctx.fill(); ctx.stroke();

                ctx.fillStyle = darkColor; ctx.beginPath(); ctx.roundRect(35, 5, 8, 5, 2); ctx.fill(); ctx.stroke();

                ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(-5, -15, 5, -30); ctx.quadraticCurveTo(-5, -30, -10, -20); ctx.lineTo(-45, -5); ctx.lineTo(-15, -5); ctx.quadraticCurveTo(-10, -5, -5, 0); ctx.fill(); ctx.stroke();

                ctx.fillStyle = '#fff'; [-35, -25, -15].forEach(tx => { ctx.beginPath(); ctx.moveTo(tx, -5); ctx.lineTo(tx + 3, 3); ctx.lineTo(tx + 6, -5); ctx.fill(); ctx.stroke(); });

                ctx.fillStyle = isVolcano ? '#f1c40f' : '#fff'; ctx.beginPath(); ctx.arc(-2, -22, 6, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(-4, -22, 2, 0, Math.PI*2); ctx.fill();

                ctx.fillStyle = bodyColor;
                ctx.beginPath(); ctx.moveTo(5, 0); ctx.quadraticCurveTo(15, wY + 20, 25, wY + 30); ctx.quadraticCurveTo(10, wY + 15, 5, 5); ctx.fill(); ctx.stroke();
                ctx.restore();
            }
            ctx.restore();
        }

        function drawFinishLine(ctx, x, y) {
            ctx.save(); ctx.translate(x, y); ctx.fillStyle='#8c5a45'; ctx.beginPath(); ctx.ellipse(5,0,30,8,0,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#c2a07c'; ctx.fillRect(-5,-160,10,160);
            ctx.fillStyle='white'; ctx.fillRect(5,-150,70,50); ctx.fillStyle='#1a1a1a'; ctx.fillRect(5,-150,35,25); ctx.fillRect(40,-125,35,25); ctx.restore();
        }

        // --- ДИНОЗАВР ---
        function drawDinosaur(ctx, x, y, walkPhase) {
            ctx.save();
            const bounce = isJumping ? 0 : Math.abs(Math.sin(walkPhase * 0.04)) * 12;
            ctx.translate(x, y + dinoYOffset - bounce); ctx.scale(0.8, 0.8);

            const cM = '#5cb368', cD = '#205c33', cB = '#8bd19a'; 
            const walk = isJumping ? 0 : walkPhase;
            const lg1 = Math.sin(walk * 0.04) * 0.6, lg2 = Math.sin(walk * 0.04 + Math.PI) * 0.6;

            ctx.fillStyle=cD; ctx.save(); ctx.translate(-15,0); ctx.rotate(lg2); ctx.beginPath(); ctx.ellipse(0,-15,14,25,0,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.roundRect(-10,5,24,14,5); ctx.fill(); ctx.restore();
            ctx.save(); ctx.translate(20,-55); ctx.rotate(lg2*0.5-0.2); ctx.beginPath(); ctx.roundRect(0,-5,18,10,5); ctx.fill(); ctx.restore();

            ctx.fillStyle=cM; ctx.beginPath(); ctx.moveTo(-10,-20); ctx.quadraticCurveTo(-70,-5,-95,-60); ctx.quadraticCurveTo(-60,25,0,15); ctx.fill();
            ctx.fillStyle=cD; [{x:-10,y:-140,a:-0.3},{x:-25,y:-120,a:-0.6},{x:-35,y:-95,a:-0.9},{x:-45,y:-70,a:-1.1},{x:-55,y:-45,a:-1.3},{x:-75,y:-45,a:-1.5}].forEach(s=>{ ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(s.a); ctx.beginPath(); ctx.moveTo(-12,0); ctx.lineTo(12,0); ctx.lineTo(0,-22); ctx.fill(); ctx.restore(); });
            
            ctx.fillStyle=cM; ctx.beginPath(); ctx.ellipse(-10,-45,45,60,Math.PI/8,0,Math.PI*2); ctx.fill();
            ctx.save(); ctx.beginPath(); ctx.ellipse(-10,-45,45,60,Math.PI/8,0,Math.PI*2); ctx.clip(); ctx.fillStyle=cB; ctx.beginPath(); ctx.ellipse(22,-35,25,55,Math.PI/8,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#6db87e'; ctx.lineWidth=3; for(let i=0;i<4;i++){ ctx.beginPath(); ctx.moveTo(5,-65+i*14); ctx.lineTo(35,-55+i*14); ctx.stroke(); } ctx.restore();
            
            ctx.fillStyle=cM; ctx.beginPath(); ctx.arc(0,-110,38,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.roundRect(-5,-125,55,42,20); ctx.fill();
            ctx.fillStyle='#1a1a1a'; ctx.beginPath(); ctx.arc(12,-120,7,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.arc(14,-122,2.5,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#f28b80'; ctx.beginPath(); ctx.arc(5,-100,8,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.beginPath(); ctx.arc(22,-110,18,Math.PI*0.15,Math.PI*0.5); ctx.stroke();

            ctx.fillStyle=cM; ctx.save(); ctx.translate(-5,5); ctx.rotate(lg1); ctx.beginPath(); ctx.ellipse(0,-20,18,30,0,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.roundRect(-12,5,30,15,[8,15,5,5]); ctx.fill(); ctx.fillStyle=cD; ctx.beginPath(); ctx.moveTo(15,18); ctx.lineTo(18,15); ctx.lineTo(12,12); ctx.fill(); ctx.restore();
            ctx.save(); ctx.translate(25,-50); ctx.rotate(lg1*0.5); ctx.beginPath(); ctx.roundRect(0,-8,22,12,6); ctx.fill(); ctx.fillStyle=cD; ctx.beginPath(); ctx.moveTo(19,-4); ctx.lineTo(23,-6); ctx.lineTo(23,-2); ctx.fill(); ctx.restore();
            
            ctx.restore();
        }

        // --- РЕНДЕР И ЦИКЛ ---
        function drawLayer(items, scrollOffset, drawFunc) {
            const tilesNeeded = Math.ceil(width / TILE_WIDTH) + 1; const normalizedOffset = scrollOffset % TILE_WIDTH;
            for (let i = 0; i < tilesNeeded; i++) { const startX = -normalizedOffset + (i * TILE_WIDTH); if (items) { for (let item of items) drawFunc(item, startX); } else { drawFunc(startX); } }
        }

        function render() {
            let pName = getLevelType(currentLevel), lType = pName;
            if (gameState === 'loading') { pName = 'sunset'; lType = 'mountains'; } else if (gameState === 'menu') { pName = 'forest'; lType = 'forest'; }
            const p = colors[pName];

            ctx.clearRect(0, 0, width, height); drawSky(p);
            drawLayer(clouds, scrollPos * 0.1, (c, sX) => drawCloud(sX + c.x, c.y, c.scale, p, c.opacity));

            const bgG = height - 100;
            if (lType === 'city') { drawLayer(cityBuildingsFar, scrollPos*0.2, (b,sX) => drawBuilding(sX+b.x, bgG, b.w, b.h, p.bgFar, b.type)); drawLayer(cityBuildingsNear, scrollPos*0.5, (b,sX) => drawBuilding(sX+b.x, bgG, b.w, b.h, p.bgNear, b.type)); drawLayer(cityTrees, scrollPos*0.8, (t,sX) => drawCityTree(sX+t.x, bgG, t.scale)); }
            else if (lType === 'forest') { drawLayer(forestFar, scrollPos*0.3, (t,sX) => drawTree(sX+t.x, bgG, t.w, t.h, p.bgFar)); drawLayer(forestNear, scrollPos*0.6, (t,sX) => drawTree(sX+t.x, bgG, t.w, t.h, p.bgNear)); }
            else { drawLayer(mountainsFar, scrollPos*0.3, (m,sX) => drawMountain(sX+m.x, bgG, m.w, m.h, p.bgFar, null)); drawLayer(mountainsNear, scrollPos*0.6, (m,sX) => drawMountain(sX+m.x, bgG, m.w, m.h, p.bgNear, p.snow)); }

            drawLayer(null, scrollPos * 1.0, (sX) => drawGroundTile(sX, p, lType));

            const dinoG = height - 120;
            for (let obs of obstacles) {
                if (obs.type === 'ground') {
                    if (lType === 'city') drawCar(ctx, obs.x, dinoG); 
                    else if (lType === 'forest') drawStump(ctx, obs.x, dinoG); 
                    else if (lType === 'desert') drawPyramid(ctx, obs.x, dinoG);
                    else if (lType === 'winter') drawSnowman(ctx, obs.x, dinoG);
                    else if (lType === 'volcano') drawLavaRock(ctx, obs.x, dinoG);
                    else drawCactus(ctx, obs.x, dinoG);
                } else if (obs.type === 'flying') {
                    drawFlyingEnemy(ctx, obs.x, dinoG + obs.yOffset, lType, scrollPos);
                } else if (obs.type === 'finish') drawFinishLine(ctx, obs.x, dinoG);
            }

            if (gameState === 'playing' && dinoYOffset === 0 && Math.random() > 0.6) {
                let pColor = '#bdc3c7';
                if (currentLevel === 4) pColor = '#f1c40f'; 
                if (currentLevel === 5) pColor = '#ffffff'; 
                if (currentLevel === 6) pColor = '#e74c3c'; 
                createParticles(width * 0.3 - 20, dinoG, pColor, 1, 'dust');
            }

            drawDinosaur(ctx, width * 0.3, dinoG, scrollPos);
            updateAndDrawParticles(ctx);
        }

        function loop() {
            let actualSpeed = baseSpeed * speedMultiplier;

            if (gameState === 'loading') {
                scrollPos += actualSpeed; loadProgress += 0.2; document.getElementById('loadingBarFill').style.width = Math.min(loadProgress, 100) + '%';
                const hitX = width * 0.3 - 15;
                if (obstacles.length === 0 || (width - obstacles[obstacles.length-1].x) > 600) obstacles.push({ x: width + 100, passed: false, type: 'ground' });
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    obstacles[i].x -= actualSpeed;
                    if (obstacles[i].type === 'ground' && obstacles[i].x > hitX && obstacles[i].x - hitX < 180 && !isJumping) { isJumping = true; dinoVelocityY = jumpForce; }
                    if (obstacles[i].x < -150) obstacles.splice(i, 1);
                }
                if (isJumping) { dinoVelocityY += gravity; dinoYOffset += dinoVelocityY; if (dinoYOffset >= 0) { dinoYOffset = 0; isJumping = false; dinoVelocityY = 0; } }
                if (loadProgress >= 100) { gameState = 'menu'; switchScreen(screenMenu); obstacles.length = 0; dinoYOffset = 0; isJumping = false; }
            
            } else if (gameState === 'playing') {
                scrollPos += actualSpeed;
                speedMultiplier = Math.min(speedMultiplier + 0.0005, 1.8);

                if (isJumping) {
                    dinoVelocityY += gravity; dinoYOffset += dinoVelocityY;
                    if (dinoYOffset >= 0) { dinoYOffset = 0; isJumping = false; dinoVelocityY = 0; createParticles(width*0.3, height-120, '#bdc3c7', 5, 'dust'); }
                }

                if (obstacles.length === 0 || (width - obstacles[obstacles.length-1].x) > (600 + Math.random() * (800 / speedMultiplier))) {
                    if (spawnedObstacles < targetObstacles) {
                        const isFlying = Math.random() > (currentLevel === 1 ? 0.75 : 0.6); 
                        
                        // Так как приседаний больше нет, все летучие враги летят низко, чтобы их нужно было перепрыгивать
                        let flyingY = -15 - Math.random() * 15;

                        obstacles.push({ x: width + 100, passed: false, type: isFlying ? 'flying' : 'ground', yOffset: isFlying ? flyingY : 0 });
                        spawnedObstacles++;
                    } else if (spawnedObstacles === targetObstacles) { obstacles.push({ x: width + 100, passed: false, type: 'finish' }); spawnedObstacles++; }
                }

                let dW = 35, dH = 75;
                let dY = height - 120 + dinoYOffset - dH;
                const dinoHitbox = { x: width * 0.3 - 10, y: dY, w: dW, h: dH };
                const levelType = getLevelType(currentLevel);

                for (let i = obstacles.length - 1; i >= 0; i--) {
                    obstacles[i].x -= actualSpeed;

                    if (obstacles[i].type === 'ground' || obstacles[i].type === 'flying') {
                        let oW, oH, oOX, oOY; 
                        if (obstacles[i].type === 'flying') {
                            if (levelType === 'mountains' || levelType === 'volcano') { oW = 100; oH = 50; oOX = -50; oOY = obstacles[i].yOffset - 40; } 
                            else if (levelType === 'forest' || levelType === 'winter') { oW = 80; oH = 60; oOX = -40; oOY = obstacles[i].yOffset - 30; } 
                            else if (levelType === 'desert') { oW = 60; oH = 30; oOX = -30; oOY = obstacles[i].yOffset - 15; }
                            else { oW = 60; oH = 30; oOX = -30; oOY = obstacles[i].yOffset - 15; } 
                        } else {
                            if (levelType === 'city') { oW = 120; oH = 50; oOX = -60; oOY = -50; } 
                            else if (levelType === 'forest') { oW = 90; oH = 75; oOX = -45; oOY = -75; }
                            else if (levelType === 'desert') { oW = 80; oH = 70; oOX = -40; oOY = -70; }
                            else if (levelType === 'winter') { oW = 60; oH = 80; oOX = -30; oOY = -80; }
                            else if (levelType === 'volcano') { oW = 80; oH = 60; oOX = -40; oOY = -60; }
                            else { oW = 40; oH = 90; oOX = -20; oOY = -90; }
                        }
                        
                        const obsHitbox = { x: obstacles[i].x + oOX, y: height - 120 + oOY, w: oW, h: oH };

                        if (dinoHitbox.x < obsHitbox.x + obsHitbox.w && dinoHitbox.x + dinoHitbox.w > obsHitbox.x &&
                            dinoHitbox.y < obsHitbox.y + obsHitbox.h && dinoHitbox.y + dinoHitbox.h > obsHitbox.y) {
                            
                            stopBGM(); // Останавливаем музыку при поражении
                            playHitSound();
                            createParticles(dinoHitbox.x + 20, dinoHitbox.y + 20, '#e74c3c', 30, 'explosion');
                            saveScore();
                            
                            gameState = 'gameOver';
                            document.getElementById('goLevel').textContent = currentLevel;
                            document.getElementById('goScore').textContent = score;
                            setTimeout(() => switchScreen(screenGameOver), 500);
                        }

                        if (!obstacles[i].passed && obstacles[i].x < width * 0.3 - 50) {
                            obstacles[i].passed = true; score += 10; playScoreSound(); updateHUD();
                        }
                    } else if (obstacles[i].type === 'finish') {
                        if (dinoHitbox.x > obstacles[i].x) {
                            stopBGM(); // Останавливаем музыку при победе
                            saveScore();
                            if (currentLevel >= 6) { 
                                gameState = 'gameComplete'; document.getElementById('gcScore').textContent = score; switchScreen(screenGameComplete);
                            } else {
                                gameState = 'levelComplete'; document.getElementById('lcLevel').textContent = currentLevel; document.getElementById('lcScore').textContent = score; switchScreen(screenLevelComplete);
                            }
                        }
                    }
                    if (obstacles[i].x < -150) obstacles.splice(i, 1);
                }
            } else if (gameState === 'menu' || gameState === 'gameOver') {
                scrollPos += 1.5;
            }

            render(); requestAnimationFrame(loop);
        }

        initGenerator(); render(); loop();
    </script>
</body>
</html>
